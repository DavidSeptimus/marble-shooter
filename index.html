<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marble Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    #hud-top-left {
      position: absolute;
      top: 20px; left: 20px;
      font-size: 18px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    #hud-top-right {
      position: absolute;
      top: 20px; right: 20px;
      font-size: 24px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      display: flex;
      gap: 8px;
    }

    .attempt-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-block;
    }
    .attempt-dot.filled { background: #fff; }

    #hud-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(0,0,0,0.9);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #hud-center.visible { opacity: 1; }

    #hud-bottom {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      opacity: 0.8;
    }

    #touch-btn {
      display: none;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 24px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
      transition: transform 0.1s ease, background 0.1s ease;
      z-index: 20;
    }
    #touch-btn.pressed {
      transform: translateX(-50%) scale(1.25);
      background: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-top-left">
      <div id="round-display">Round 1 / 3</div>
      <div id="marble-display">Marble 1 / 10</div>
    </div>
    <div id="hud-top-right">
      <div class="attempt-dot filled"></div>
      <div class="attempt-dot filled"></div>
      <div class="attempt-dot filled"></div>
    </div>
    <div id="hud-center"></div>
    <div id="hud-bottom">Press SPACE to start</div>
    <button id="touch-btn" aria-label="Action">GO</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
